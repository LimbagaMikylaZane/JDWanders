    <link

    <style>
      body {
        font-family: "Poppins", sans-serif;

      .form-box {
        max-width: 500px;

      }

      footer {
        background-color: #1f1f1f;

        text-align: center;

    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
      <div class="container-fluid">
        <a class="navbar-brand text-warning" href="#">
          <img src="img/logo.jpg" alt="JD Wanders Logo" class="logo" />
          JD Wanders
        </a>
        <button

          data-bs-toggle="collapse"

          aria-label="Toggle navigation"

          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link text-warning" href="landing.html">Home</a>

        </div>

    <!-- Booking Form -->
    <div class="form-box">
      <h2 class="text-warning text-center mb-4">Book Your Tour</h2>
      <form action="book.php" method="POST">
        <div class="mb-3">
          <label for="fullname">Full Name</label>
          <input
            type="text"
            class="form-control"
            id="fullname"
            name="fullname"
            required
          />
        </div>

        <div class="mb-3">
          <label for="email">Email Address</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            required
          />
        </div>

        <div class="mb-3">
          <label for="tour">Select Tour</label>
          <select
            class="form-select"
            id="tour"
            name="tour"
            onchange="updateDates()"
            required
          >
            <option value="">-- Choose Tour --</option>
            <option value="Calayan Adventure">Calayan Adventure (2 Days)</option>
            <option value="Bukidnon Tour">Bukidnon Tour (3 Days)</option>
            <option value="Mt. Fato x Mt. Kupapey">Mt. Fato x Mt. Kupapey (3 Days)</option>
            <option value="Siquijor Island Tour">Siquijor Island Tour (2 Days)</option>
            <option value="Zambales to Zamboanga Tour">Zambales to Zamboanga (4 Days)</option>
            <option value="Camiguin Island Tour">Camiguin Island Tour (3 Days)</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="date">Tour Schedule</label>
          <select class="form-select" id="date" name="date" required>
            <option value="">-- Select Date --</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="participants">No. of Participants</label>
          <input
            type="number"
            class="form-control"
            id="participants"
            name="participants"
            min="1"
            required
          />
        </div>

        <div class="mb-3">
          <label for="notes">Special Requests</label>
          <textarea
            class="form-control"
            id="notes"
            name="notes"
            rows="2"
            placeholder="Any special needs or requests?"
          ></textarea>
        </div>

        <!-- Payment Method -->
        <div class="mb-3">
          <label for="paymentMethod">Payment Method</label>
          <select
            class="form-select"
            id="paymentMethod"
            name="paymentMethod"
            required
            onchange="showPaymentFields()"
          >
            <option value="">-- Select Payment Method --</option>
            <option value="gcash">Gcash</option>
            <option value="bank_transfer">Bank Transfer</option>
            <option value="paypal">Paypal</option>
            <option value="credit_card">Credit Card</option>
          </select>
        </div>

        <!-- Payment Credentials -->
        <div id="paymentFields">
          <div id="gcashFields" style="display:none" class="mb-3">
            <label for="gcashPhone">Gcash Phone Number</label>
            <input
              type="tel"
              class="form-control"
              id="gcashPhone"
              name="gcashPhone"
              placeholder="e.g., 0917xxxxxxx"
              pattern="[0-9]{10,11}"
            />
          </div>

          <div id="bankFields" style="display:none" class="mb-3">
            <label for="bankName">Bank Name</label>
            <input
              type="text"
              class="form-control"
              id="bankName"
              name="bankName"
              placeholder="e.g., BDO, BPI"
            />
            <label for="bankAccount" class="mt-2">Bank Account Number</label>
            <input
              type="text"
              class="form-control"
              id="bankAccount"
              name="bankAccount"
              placeholder="Account Number"
            />
          </div>

          <div id="paypalFields" style="display:none" class="mb-3">
            <label for="paypalEmail">Paypal Email</label>
            <input
              type="email"
              class="form-control"
              id="paypalEmail"
              name="paypalEmail"
              placeholder="your-email@example.com"
            />
          </div>

          <div id="cardFields" style="display:none" class="mb-3">
            <label for="cardNumber">Card Number</label>
            <input
              type="text"
              class="form-control"
              id="cardNumber"
              name="cardNumber"
              maxlength="16"
              placeholder="1234 5678 9012 3456"
              pattern="\d{13,16}"
            />
            <label for="cardExpiry" class="mt-2">Expiry Date</label>
            <input
              type="month"
              class="form-control"
              id="cardExpiry"
              name="cardExpiry"
            />
            <label for="cardCVV" class="mt-2">CVV</label>
            <input
              type="password"
              class="form-control"
              id="cardCVV"
              name="cardCVV"
              maxlength="4"
              placeholder="123"
            />
          </div>
        </div>

   <button type="submit" class="btn btn-warning w-100">Book Now</button>
      </form>
    </div>

    <footer>
      <p>&copy; 2025 JD Wanders Travel and Tour</p>
    </footer>

    <script>
      // Tour dates data
      const tourDates = {
        "Calayan Adventure": [
          { value: "2025-06-15", text: "June 15-16, 2025" },
          { value: "2025-07-10", text: "July 10-11, 2025" },
          { value: "2025-08-05", text: "August 5-6, 2025" },
        ],
        "Bukidnon Tour": [
          { value: "2025-06-15", text: "June 15-16, 2025" },
          { value: "2025-07-10", text: "July 10-11, 2025" },
          { value: "2025-08-05", text: "August 5-6, 2025" },
        ],
        "Mt. Fato x Mt. Kupapey": [
          { value: "2025-06-20", text: "June 20-22, 2025" },
          { value: "2025-07-15", text: "July 15-17, 2025" },
          { value: "2025-08-10", text: "August 10-12, 2025" },
        ],
        "Siquijor Island Tour": [
          { value: "2025-06-25", text: "June 25-26, 2025" },
          { value: "2025-07-20", text: "July 20-21, 2025" },
          { value: "2025-08-15", text: "August 15-16, 2025" },
        ],
        "Zambales to Zamboanga Tour": [
          { value: "2025-06-28", text: "June 28 - July 1, 2025" },
          { value: "2025-07-25", text: "July 25-28, 2025" },
          { value: "2025-08-20", text: "August 20-23, 2025" },
    ],
    "Camiguin Island Tour": [
      { value: "2025-07-05", text: "July 5-7, 2025" },
      { value: "2025-08-01", text: "August 1-3, 2025" },
      { value: "2025-08-25", text: "August 25-27, 2025" },
    ],
  };

  function updateDates() {
    const tourSelect = document.getElementById("tour");
    const dateSelect = document.getElementById("date");
    const selectedTour = tourSelect.value;

    // Clear old options
    dateSelect.innerHTML = '<option value="">-- Select Date --</option>';

    if (selectedTour && tourDates[selectedTour]) {
      tourDates[selectedTour].forEach((date) => {
        const option = document.createElement("option");
        option.value = date.value;
        option.textContent = date.text;
        dateSelect.appendChild(option);
      });
    }
  }

  function showPaymentFields() {
    const method = document.getElementById("paymentMethod").value;

    document.getElementById("gcashFields").style.display =
      method === "gcash" ? "block" : "none";
    document.getElementById("bankFields").style.display =
      method === "bank_transfer" ? "block" : "none";
    document.getElementById("paypalFields").style.display =
      method === "paypal" ? "block" : "none";
    document.getElementById("cardFields").style.display =
      method === "credit_card" ? "block" : "none";
  }
</script>
